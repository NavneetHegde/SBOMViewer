name: CI — Build and Unit Tests

on:
  pull_request:
    branches: [main, 'release/*']
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - '**.txt'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore SBOMViewer.slnx

      - run: dotnet build SBOMViewer.slnx --no-restore -c Release

      - name: Run unit tests
        run: |
          dotnet test tests/SBOMViewer.Blazor.Tests/SBOMViewer.Blazor.Tests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=unit-tests.trx" \
            --results-directory TestResults

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 14

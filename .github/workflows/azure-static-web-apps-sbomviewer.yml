name: Deploy Blazor WASM to Azure Static Web App

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - '**.txt'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    permissions:
      contents: write  # needed to create GitHub releases
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore SBOMViewer.slnx

      - run: dotnet build SBOMViewer.slnx --no-restore -c Release

      - name: Run unit tests
        run: |
          dotnet test tests/SBOMViewer.Blazor.Tests/SBOMViewer.Blazor.Tests.csproj \
            --no-build -c Release

      - run: dotnet publish src/SBOMViewer.Blazor/SBOMViewer.Blazor.csproj -c Release --output publish_output

      - name: Generate SBOM
        run: |
          dotnet tool install --global CycloneDX
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          dotnet CycloneDX src/SBOMViewer.Blazor/SBOMViewer.Blazor.csproj \
            -o publish_output/wwwroot \
            -fn "sbomviewer_${VERSION}.json" \
            -F Json \
            -t \
            -sv "$VERSION" \
            -sn SBOMViewer

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "publish_output/wwwroot"
          api_location: ""
          output_location: ""
          skip_app_build: true   # Already published above

      - name: Read version
        id: version
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          # Find previous release tag for changelog range
          PREV_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")

          # Build release notes: deployment info + auto-generated changelog & contributors
          NOTES="Deployed to [sbomviewer.com](https://sbomviewer.com) from commit ${{ github.sha }}."
          if [ -n "$PREV_TAG" ]; then
            AUTO_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$TAG" \
              -f target_commitish="${{ github.sha }}" \
              -f previous_tag_name="$PREV_TAG" \
              --jq '.body' 2>/dev/null || echo "")
          else
            AUTO_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$TAG" \
              -f target_commitish="${{ github.sha }}" \
              --jq '.body' 2>/dev/null || echo "")
          fi

          if [ -n "$AUTO_NOTES" ]; then
            NOTES="$NOTES"$'\n\n'"$AUTO_NOTES"
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            --latest 2>/dev/null || echo "Release $TAG already exists — skipping"

  close_pull_request:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "close"
